# GitNova - Docker Compose for local production testing
# Usage: docker compose up --build

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gitnova-api
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
